version: 2

models:
  - name: silver_dates
    description: "Master calendar dimension containing calendar attributes, holidays, and fiscal groupings."
    columns:
      - name: date_key
        description: "Surrogate key in YYYYMMDD format."
        tests:
          - unique
          - not_null

      - name: date_day
        description: "The actual date value."
        tests:
          - unique
          - not_null